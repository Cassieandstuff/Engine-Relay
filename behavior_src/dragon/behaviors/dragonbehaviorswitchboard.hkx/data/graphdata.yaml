# Graph data for DragonBehaviorSwitchboard.hkb
#
# This is the deployed fallback shell — compiled once and shipped in the mod.
# At runtime, BehaviorFileInterceptor intercepts "dragonbehaviorswitchboard.hkx"
# and serves an in-memory HKX generated by HkxBsbWriter with all registered
# dragon sub-behaviors baked in.
#
# The shell intentionally declares no events or variables.  All sub-behavior
# events are present in the generated HKX at runtime.  If interception or
# generation fails, Havok loads this fallback and the dragon holds its pose.

variables: []

events: []
