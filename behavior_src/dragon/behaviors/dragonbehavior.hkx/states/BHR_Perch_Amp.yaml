class: hkbStateMachine
name: BHR_Perch_Amp
startStateId: 0
transitions:
  - event: EnterPerchAmpInstant
    toState: ST_Perch_Amp_Idle
    transition: null
    flags: FLAG_IS_GLOBAL_WILDCARD|FLAG_DISABLE_CONDITION
  - event: staggerStart
    toState: ST_Perch_Amp_Stagger
    transition: null
    flags: FLAG_IS_LOCAL_WILDCARD|FLAG_DISABLE_CONDITION|FLAG_DELAY_STATE_CHANGE
states:
  - ST_Perch_Amp_Idle
  - ST_Perch_Amp_Shout
  - ST_Perch_Amp_Stagger