class: hkbStateMachine
name: BHR_Ground
startStateId: 0
bindings:
  - memberPath: isActive
    variable: IsOnGround
transitions:
  - event: bleedOutStart
    toState: ST_BleedOut1
    transition: null
    flags: FLAG_IS_LOCAL_WILDCARD|FLAG_DISABLE_CONDITION
  - event: to_TimeTravel
    toState: ST_TimeTravel
    transition: defaultTransitionEffect
    flags: FLAG_IS_LOCAL_WILDCARD|FLAG_IS_GLOBAL_WILDCARD|FLAG_DISABLE_CONDITION
  - event: Ground_Mount_Dragon
    toState: ST_Ground_Mount
    transition: defaultTransitionEffect
    flags: FLAG_IS_LOCAL_WILDCARD|FLAG_IS_GLOBAL_WILDCARD|FLAG_DISABLE_CONDITION
  - event: bleedOutStartSpecial
    toState: ST_BleedOut2
    transition: defaultTransitionEffect
    flags: FLAG_IS_LOCAL_WILDCARD|FLAG_IS_GLOBAL_WILDCARD|FLAG_DISABLE_CONDITION
  - event: pa_DragonMountEnter
    toState: ST_Ground_Mount_Actor
    transition: defaultTransitionEffect
    flags: FLAG_IS_LOCAL_WILDCARD|FLAG_DISABLE_CONDITION
  - event: pa_DragonMountExit
    toState: ST_Ground_Dismount_Actor
    transition: defaultTransitionEffect
    flags: FLAG_IS_LOCAL_WILDCARD|FLAG_IS_GLOBAL_WILDCARD|FLAG_DISABLE_CONDITION
  - event: summonStart
    toState: ST_Summon
    transition: defaultTransitionEffect
    flags: FLAG_TO_NESTED_STATE_ID_IS_VALID|FLAG_IS_LOCAL_WILDCARD|FLAG_IS_GLOBAL_WILDCARD|FLAG_DISABLE_CONDITION
    toNestedStateId: 1
  - event: dispelStart
    toState: ST_Summon
    transition: null
    flags: FLAG_TO_NESTED_STATE_ID_IS_VALID|FLAG_IS_LOCAL_WILDCARD|FLAG_IS_GLOBAL_WILDCARD|FLAG_DISABLE_CONDITION
states:
  - ST_Ground_Default
  - ST_BleedOut1
  - ST_TimeTravel
  - ST_Ground_Mount
  - ST_BleedOut2
  - ST_Ground_Mount_Actor
  - ST_Ground_Dismount_Actor
  - ST_Summon