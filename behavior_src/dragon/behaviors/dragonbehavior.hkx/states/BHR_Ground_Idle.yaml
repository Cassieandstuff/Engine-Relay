class: hkbStateMachine
name: BHR_Ground_Idle
startStateId: 0
bindings:
  - memberPath: isActive
    variable: IsIdle
transitions:
  - event: staggerStart
    toState: ST_Ground_Idle_Stagger
    transition: null
    flags: FLAG_IS_LOCAL_WILDCARD|FLAG_DISABLE_CONDITION
  - event: injureStart
    toState: ST_Ground_Idle_Injure
    transition: null
    flags: FLAG_IS_LOCAL_WILDCARD|FLAG_DISABLE_CONDITION
states:
  - ST_Ground_Idle_Default
  - ST_Ground_Idle_Stagger
  - ST_Ground_Idle_Injure