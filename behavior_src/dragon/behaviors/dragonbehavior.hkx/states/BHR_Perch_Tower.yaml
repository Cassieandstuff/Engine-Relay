class: hkbStateMachine
name: BHR_Perch_Tower
startStateId: 0
transitions:
  - event: EnterPerchTowerInstant
    toState: ST_Perch_Tower_Idle
    transition: null
    flags: FLAG_IS_GLOBAL_WILDCARD|FLAG_DISABLE_CONDITION
  - event: staggerStart
    toState: ST_Perch_Tower_Stagger
    transition: null
    flags: FLAG_IS_LOCAL_WILDCARD|FLAG_DISABLE_CONDITION
states:
  - ST_Perch_Tower_Idle
  - ST_Perch_Tower_Shout
  - ST_Perch_Tower_Stagger
  - ST_Perch_Tower_Roar