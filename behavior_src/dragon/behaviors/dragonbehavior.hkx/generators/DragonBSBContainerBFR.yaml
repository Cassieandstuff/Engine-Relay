# Behavior Reference Generator that loads DragonBehaviorSwitchboard.hkb.
#
# BehaviorFileInterceptor intercepts the file open for
# "dragonbehaviorswitchboard.hkx" and serves the BSB-generated bytes in
# memory instead.  BSB_Activate then fires on the loaded graph, bumps
# numStaticNodes, reads the pending BSB event (SetPendingBSBEvent), sets
# DSB_SwitchboardSM's startStateId to the registered sub-behavior index,
# and allows Havok's Activate to build index maps — so the sub-behavior
# is fully wired before any animations need to play.
class: hkbBehaviorReferenceGenerator
name: DragonBSBContainerBFR
behaviorName: "DragonBehaviorSwitchboard.hkb"
